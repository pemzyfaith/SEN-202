<!DOCTYPE html>
<html>
<head>
    <title>SIM - Security Incident Mapping</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>SIM - Security Incident Mapping</h1>
    <p>Report Campus Security Incidents</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Report Incident</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

<h2>Report an Incident</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Matric Number</label>
<input type="text" placeholder="Enter matric number">

<label>Incident Type</label>
<select>
<option>Robbery</option>
<option>Assault</option>
<option>Kidnapping</option>
<option>Cultism</option>
<option>Harassment</option>
</select>

<label>Location</label>
<input type="text" placeholder="Enter location">

<label>Description</label>
<textarea rows="5"></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

<footer>
<p>© 2026 SIM Project</p>
</footer>

</body>
</html>
